name: 🏠 Daily Funda Scraper

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape & Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Ensure images directory exists
        run: mkdir -p images

      - name: Run Funda scraper
        run: python funda_scraper.py

      - name: Verify output
        run: |
          python -c "
          import json, os
          data = json.load(open('daily_houses.json'))
          print(f'{len(data)} huizen opgeslagen')
          imgs = [h['image'] for h in data if h.get('image','').startswith('images/')]
          print(f'{len(imgs)} lokale afbeeldingen in JSON')
          files = os.listdir('images') if os.path.isdir('images') else []
          print(f'{len(files)} bestanden in images/: {files[:5]}')
          "

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add daily_houses.json

          # Voeg afbeeldingen toe als de map niet leeg is (voorkomt glob-crash)
          if [ -n "$(ls images/ 2>/dev/null)" ]; then
            git add images/
          fi

          git diff --cached --quiet || \
            git commit -m "chore: 🏠 update houses & images $(date -u '+%Y-%m-%d')"
          git push
