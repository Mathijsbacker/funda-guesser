name: 🏠 Daily Funda Scraper

on:
  schedule:
    # Every night at 00:05 UTC (slight offset to avoid GitHub busy-period)
    - cron: "5 0 * * *"
  workflow_dispatch:   # allow manual runs from the Actions tab

jobs:
  scrape:
    name: Scrape & Commit
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

# ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install Python packages
        run: |
          pip install playwright requests  # <--- 'requests' toegevoegd
          playwright install chromium --with-deps

      # ... stap 4 en 5 blijven hetzelfde ...

      # ── 6. Commit de nieuwe JSON én de afbeeldingen ────────────────────────
      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_houses.json images/*.jpg  # <--- Voegt ook de plaatjes toe
          git diff --cached --quiet || \
            git commit -m "chore: 🏠 update houses & images $(date -u '+%Y-%m-%d')"
          git push
