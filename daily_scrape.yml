name: 🏠 Daily Funda Scraper

on:
  schedule:
    # Every night at 00:05 UTC (slight offset to avoid GitHub busy-period)
    - cron: "5 0 * * *"
  workflow_dispatch:   # allow manual runs from the Actions tab

jobs:
  scrape:
    name: Scrape & Commit
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install Python packages
        run: |
          pip install playwright
          playwright install chromium --with-deps

      # ── 4. Run the scraper ────────────────────────────────────────────────
      - name: Run Funda scraper
        run: python funda_scraper.py
        env:
          # Add any secret env vars here (e.g. proxy credentials)
          # PROXY_URL: ${{ secrets.PROXY_URL }}
          PYTHONUNBUFFERED: "1"

      # ── 5. Verify output ──────────────────────────────────────────────────
      - name: Verify JSON output
        run: |
          python - <<'EOF'
          import json, sys
          data = json.loads(open("daily_houses.json").read())
          assert isinstance(data, list), "Not a list"
          assert len(data) >= 5, f"Too few houses: {len(data)}"
          print(f"✅ {len(data)} houses in daily_houses.json")
          EOF

      # ── 6. Commit the new JSON ────────────────────────────────────────────
      - name: Commit updated daily_houses.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_houses.json
          # Only commit if there are actual changes
          git diff --cached --quiet || \
            git commit -m "chore: 🏠 daily houses update $(date -u '+%Y-%m-%d')"
          git push
